name: MinIO pipeline integration test

on:
  workflow_call:

jobs:
  snapshot:
    name: "MinIO pipeline ${{ matrix.config.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: csv-raw
            flags: "--skip-decode --skip-enrich --skip-parquet --skip-encrypt --skip-snake-case"
          - name: csv-decoded-enriched
            flags: "--skip-parquet --skip-encrypt --skip-snake-case"
          - name: full-pipeline
            flags: ""
    env:
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: 1cijferho-pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data

          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            echo "Waiting for MinIO... ($i)"
            sleep 1
          done

      - name: Create bucket and upload demo data
        run: |
          curl -sSf https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb local/1cijferho-pipeline --ignore-existing
          mc cp --recursive data/01-input/DEMO/ local/1cijferho-pipeline/data/01-input/DEMO/

          echo "=== Uploaded files ==="
          mc ls --recursive local/1cijferho-pipeline/data/01-input/DEMO/ | head -30

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies (with minio extra)
        run: uv sync --group dev --extra minio

      - name: Run pipeline (${{ matrix.config.name }})
        run: |
          uv run eencijferho pipeline \
            --input data/01-input/DEMO \
            --output data/test-output/${{ matrix.config.name }} \
            ${{ matrix.config.flags }}

      - name: Validate snapshot (${{ matrix.config.name }})
        run: |
          uv run python -m eencijferho.utils.snapshot_validator \
            --output data/test-output/${{ matrix.config.name }} \
            --snapshot snapshots/${{ matrix.config.name }}/snapshot.json \
            --validate
