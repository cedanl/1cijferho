name: Pipeline integration test

on:
  workflow_call:

jobs:
  snapshot:
    name: "Pipeline config ${{ matrix.config.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: c1
            flags: "--skip-decode --skip-enrich --skip-parquet --skip-encrypt --skip-snake-case"
          - name: c2
            flags: "--skip-parquet --skip-encrypt --skip-snake-case"
          - name: c3
            flags: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pipeline (${{ matrix.config.name }})
        run: |
          uv run eencijferho pipeline \
            --input data/01-input/DEMO \
            --output data/test-output/${{ matrix.config.name }} \
            ${{ matrix.config.flags }}

      - name: Validate snapshot (${{ matrix.config.name }})
        run: |
          uv run python -m eencijferho.utils.snapshot_validator \
            --output data/test-output/${{ matrix.config.name }} \
            --snapshot snapshots/${{ matrix.config.name }}/snapshot.json \
            --validate
