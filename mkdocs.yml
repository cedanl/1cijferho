site_name: 1CijferHO
site_description: Verwerk DUO-onderwijsdata naar analyse-klare CSV/Parquet bestanden
site_url: https://cedanl.github.io/1cijferho/
repo_url: https://github.com/cedanl/1cijferho
repo_name: cedanl/1cijferho
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: nl
  logo: assets/npuls_logo.png
  favicon: assets/npuls_logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Donker thema
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Licht thema
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search:
      lang: nl
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Aan de slag: getting-started.md
  - CLI-referentie: cli.md
  - API-referentie: api/index.md
  - Opslag backends: storage-abstraction.md
